spring.application.name=githubaccessreportbackend
server.port=${PORT:3001}

# GitHub API Configuration
# GITHUB_TOKEN must be set as an environment variable or in the .env file (Personal Access Token)
github.token=${GITHUB_TOKEN:}
github.api.base-url=${GITHUB_API_BASE_URL:https://api.github.com}
# Maximum number of concurrent requests to GitHub API
github.api.max-concurrency=${GITHUB_API_MAX_CONCURRENCY:10}
# Items per page for GitHub pagination (max 100)
github.api.per-page=${GITHUB_API_PER_PAGE:100}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics

# Swagger/OpenAPI Configuration
# Use the default /v3/api-docs path that Swagger UI expects
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Respect X-Forwarded-* / Forwarded headers so redirects preserve external scheme/host/port
server.forward-headers-strategy=framework

# Logging
logging.level.com.example.githubaccessreportbackend=INFO
